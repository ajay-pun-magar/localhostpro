<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Localhostpro!</title>
    <style>
        /* Base Styling matching your original design */
        body {
            font-family: "Arial", sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background-color: #ffffff;
        }
      
        h1 {
            font-size: 48pt;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #000;
        }

        h2 {
            font-size: 26pt;
            font-weight: bold;
            margin: 0 0 60px 0;
            color: #000;
        }

        /* Action Buttons Container (Replacing the old | link format) */
        .cta-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .btn-main {
            font-size: 36pt;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            padding: 10px 30px;
            border: 2px solid transparent;
            border-radius: 8px;
            background-color: #40f;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .btn-main:hover {
            background-color: #f5f5f5;
            border-color: #40f;
            color: #40f;
        }

      
    </style>
</head>
<body>


    <!-- Center Landing Content -->
    <div class="container">
        <h1>Welcome to Localhostpro!</h1>
        <h2>Host your webpage online in a click.</h2>

        <div class="cta-container">
            <a href="../create" class="btn-main">CREATE</a>
            <a href="../explore" class="btn-main">EXPLORE</a>
        </div>
    </div>

</body>
</html>
